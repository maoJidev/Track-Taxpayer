server {
    listen 3000;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /visionapi/ {
        # Proxy to the actual backend IP found in vite.config.js
        proxy_pass http://10.208.1.207:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Simulate changeOrigin: true by setting the Host to the target
        proxy_set_header Host 10.208.1.207:8080;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer tuning for large report responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Extended timeouts for long-running reports
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /authapi/ {
        # Proxy to the special backend using prefix replacement
        # This replaces '/authapi/' with '/taxpayer-tracking/' automatically
        proxy_pass http://10.208.1.207:8081/taxpayer-tracking/;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 10.208.1.207:8081;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mimic same-origin headers for auth stability
        proxy_set_header Origin "http://10.208.1.207:8081";
        proxy_set_header Referer "http://10.208.1.207:8081/taxpayer-tracking/";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
